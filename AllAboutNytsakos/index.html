        @keyframes glow {

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Discord tag to copy (placeholder - replace with actual Discord tag)
        const discordTag = " https://discord.gg/SXwXgwnxMf";
        
        // Copy Discord Tag function
        function copyDiscordTag() {
            navigator.clipboard.writeText(discordTag).then(() => {
                showNotification();
            }).catch(err => {
                console.error('Failed to copy: ', err);
                // Fallback for older browsers
                const textArea = document.createElement("textarea");
                textArea.value = discordTag;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showNotification();
            });
        }
        
        // Show notification function
        function showNotification() {
            const notification = document.getElementById('copyNotification');
            notification.classList.add('show');
            
            // Re-initialize icons in notification
            lucide.createIcons();
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }
        
        // Add smooth scroll behavior
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        // Add subtle parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) / window.innerWidth;
            const y = (e.clientY - window.innerHeight / 2) / window.innerHeight;
            
            const decorations = document.querySelectorAll('.fixed.inset-0 > div');
            decorations.forEach((el, index) => {
                const speed = (index + 1) * 2;
                el.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
